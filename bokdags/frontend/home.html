<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BokDags</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lora:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css">
  <script src="index.js" defer></script>
  
</head>
<body>

  <!-- ── Nav ── -->
<nav>
  <a href="./home.html">
    <img src="BokDags.png" alt="BokDags" width="80px">
  </a>

  <div class="nav-actions">
    <a href="./admin.html" id="adminLink" class="btn-secondary" style="display:none;">Admin</a>
    <a href="./profile.html" class="btn-secondary">Min Profil</a>
    <button class="btn-primary" id="navBtn">Logga ut</button>
  </div>
</nav>

  <!-- ── Main catalog ── -->
  <main>
    <section class="hero">
      <!-- OBS skapa funktion för att se vem som är inloggad. -->
      <h1>Hej <span id="usernameDisplay">inloggad</span>!</h1>
      <p>Välkommen till BokDags. Här kan du lista och betygsätta dina favoritböcker.</p>
    </section>

    <div class="toolbar">
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="Sök titel eller författare…" />
      </div>
      <div class="sort-group">
        <button class="sort-btn active" id="sortNew" onclick="setSort('new')">Nyast</button>
        <button class="sort-btn" id="sortTop" onclick="setSort('top')">Högst betyg</button>
      </div>
    </div>

    <div class="book-grid" id="bookGrid"></div>
  </main>

<!-- ── Bokdetaljer modal ── -->
<div class="overlay" id="bookOverlay" onclick="if(event.target===this) closeBookModal()">
  <div class="book-modal" id="bookModal"></div>
</div>
<br><br><br><br>
<footer class="site-footer">
  <p>© Victoria Friberg 2026</p>
</footer>
</body>
</html>
